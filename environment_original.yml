# ================================================================================
#   SMART-MS Original Experiment Environment Configuration
#   (Original Experiment Environment — Conda Environment File)
# ================================================================================
#
#   This environment file records the exact configuration of the conda virtual
#   environment used in the original experiment (project-required libraries and
#   their exact versions). Use this file to precisely reproduce the Python
#   environment and dependency versions from the original experiment.
#
#   Environment name: smartms
#
#   Create environment:
#       conda env create -f environment_original.yml
#
#   Activate environment:
#       conda activate smartms
#
