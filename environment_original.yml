name: smartms
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10.18
  - pip
  - pip:
    - pandas==2.3.2
    - numpy==2.2.6
    - lightgbm==4.6.0
    - scikit-learn==1.7.2
    - matplotlib==3.10.6
    - seaborn==0.13.2
    - joblib==1.5.2
    - tqdm==4.67.1